<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lagomplan — Sidebar Newsletter Card (Prototype A)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pine:       #0F3A33;
      --sage:       #6B8F86;
      --sand:       #EDE7E1;
      --cream:      #F4F0E8;
      --sand-light: #F7F4F0;
      --pale:       #C8D5D2;
      --near-black: #0E1A17;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--sand-light);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    /* ─── CARD ──────────────────────────────────────────────── */
    .newsletter-card {
      width: 220px;
      background: var(--pine);
      border-radius: 4px;
      padding: 16px;
    }

    .nl-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 7px;
    }

    .nl-headline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 15px;
      color: var(--sand);
      line-height: 1.3;
      margin-bottom: 5px;
    }

    .nl-sub {
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      color: rgba(237, 231, 225, 0.5);
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .nl-input {
      width: 100%;
      display: block;
      background: rgba(244, 240, 232, 0.08);
      border: 1px solid rgba(244, 240, 232, 0.2);
      border-radius: 3px;
      padding: 8px 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      color: var(--cream);
      outline: none;
      margin-bottom: 7px;
      transition: border-color 0.15s;
    }

    .nl-input::placeholder { color: rgba(244, 240, 232, 0.28); }
    .nl-input:focus { border-color: rgba(244, 240, 232, 0.45); }

    .nl-btn {
      width: 100%;
      display: block;
      background: rgba(244, 240, 232, 0.12);
      border: 1px solid rgba(244, 240, 232, 0.5);
      border-radius: 3px;
      padding: 8px 0;
      font-family: 'Manrope', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--cream);
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nl-btn:hover { background: rgba(244, 240, 232, 0.2); }
    .nl-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .nl-privacy {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: rgba(244, 240, 232, 0.22);
      margin-top: 7px;
      text-align: center;
    }

    /* ─── ERROR ─────────────────────────────────────────────── */
    .nl-error {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #F4A393;
      margin-top: 5px;
      display: none;
    }

    /* ─── SUCCESS STATE ─────────────────────────────────────── */
    .nl-success {
      display: none;
      text-align: center;
      padding: 8px 0;
    }

    .nl-success-check {
      font-size: 20px;
      color: var(--sage);
      margin-bottom: 6px;
    }

    .nl-success-text {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--cream);
      margin-bottom: 3px;
    }

    .nl-success-sub {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: rgba(244, 240, 232, 0.35);
    }
  </style>
</head>
<body>

  <div class="newsletter-card" id="newsletter-card">

    <div id="nl-form-content">
      <div class="nl-label">Boletín</div>
      <div class="nl-headline">Más guías como esta.</div>
      <div class="nl-sub">Destinos, tips y Mundial 2026 — en tu correo.</div>

      <input
        class="nl-input"
        id="nl-email"
        type="email"
        placeholder="tu@correo.com"
        autocomplete="email"
        aria-label="Tu correo electrónico"
      />
      <div class="nl-error" id="nl-error">Verifica tu correo.</div>
      <button class="nl-btn" id="nl-btn">Unirme →</button>
      <div class="nl-privacy">Sin spam · Cancela cuando quieras</div>
    </div>

    <div class="nl-success" id="nl-success">
      <div class="nl-success-check">✓</div>
      <div class="nl-success-text">¡Ya estás dentro.</div>
      <div class="nl-success-sub">Revisa tu correo para confirmar.</div>
    </div>

  </div>

  <script>
    const MAILCHIMP_URL = 'YOUR_MAILCHIMP_ACTION_URL';

    const emailInput = document.getElementById('nl-email');
    const btn        = document.getElementById('nl-btn');
    const errorEl    = document.getElementById('nl-error');
    const formEl     = document.getElementById('nl-form-content');
    const successEl  = document.getElementById('nl-success');

    btn.addEventListener('click', submit);
    emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

    function submit() {
      const email = emailInput.value.trim();
      errorEl.style.display = 'none';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '...';

      const cbName = 'lgmSbCb' + Date.now();
      const url = MAILCHIMP_URL.replace('/post?', '/post-json?') +
                  '&EMAIL=' + encodeURIComponent(email) + '&c=' + cbName;

      window[cbName] = function (data) {
        if (data.result === 'success') {
          formEl.style.display = 'none';
          successEl.style.display = 'block';
        } else {
          errorEl.textContent = data.msg && data.msg.length < 80
            ? data.msg : 'Verifica tu correo e intenta de nuevo.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Unirme →';
        }
        delete window[cbName];
      };

      const script = document.createElement('script');
      script.src = url;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
