<!--
  LAGOMPLAN — Inline Newsletter CTA Block
  ========================================
  WHERE TO PASTE: Webflow → Open any Guide page → drag an "Embed" element
  between Section 2 and Section 3 of the guide content → paste this code.

  OR: Make it a Webflow Symbol so you can reuse it across all guide pages
  without copy-pasting.

  SETUP:
  1. Replace YOUR_MAILCHIMP_ACTION_URL below with your Mailchimp form action URL.
  2. To reuse across pages: select the embed block → right-click → "Create Symbol".

  BEHAVIOR:
  - Sits inline, between guide sections — reads as editorial, not promotional
  - On successful submit: form replaced with a short thank-you line
  - If user already subscribed (popup form), the CTA still shows — they'll just
    get a "you're already subscribed" message from Mailchimp, which is fine
-->

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap');

  .lgm-inline-wrap {
    margin: 40px 0;
    font-family: 'DM Sans', sans-serif;
  }

  .lgm-inline-block {
    background: #FDFCF9;
    border: 1px solid #C8D9D3;
    border-left: 3px solid #1B4D3E;
    border-radius: 0 4px 4px 0;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .lgm-inline-text {
    flex: 1;
    min-width: 180px;
  }

  .lgm-inline-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: #2D6B57;
    margin-bottom: 4px;
  }

  .lgm-inline-headline {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: #0F1A16;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .lgm-inline-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: #9CA3AF;
    line-height: 1.5;
  }

  .lgm-inline-form {
    display: flex;
    flex-shrink: 0;
    flex-wrap: nowrap;
  }

  .lgm-inline-input {
    background: #F4F0E8;
    border: 1px solid #C8D9D3;
    border-right: none;
    border-radius: 4px 0 0 4px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #0F1A16;
    outline: none;
    width: 190px;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .lgm-inline-input::placeholder {
    color: #9CA3AF;
  }

  .lgm-inline-input:focus {
    border-color: #1B4D3E;
  }

  .lgm-inline-btn {
    background: #1B4D3E;
    color: #F4F0E8;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    border: none;
    border-radius: 0 4px 4px 0;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    -webkit-appearance: none;
  }

  .lgm-inline-btn:hover {
    background: #2D6B57;
  }

  .lgm-inline-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .lgm-inline-error {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #C0392B;
    margin-top: 6px;
    width: 100%;
    display: none;
  }

  .lgm-inline-success {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 16px 24px;
  }

  .lgm-inline-success-check {
    font-size: 20px;
    color: #1B4D3E;
    flex-shrink: 0;
  }

  .lgm-inline-success-msg {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: #0F1A16;
  }

  .lgm-inline-success-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #9CA3AF;
    margin-top: 2px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .lgm-inline-block {
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .lgm-inline-form {
      width: 100%;
    }

    .lgm-inline-input {
      flex: 1;
      width: auto;
    }
  }
</style>

<div class="lgm-inline-wrap">
  <div class="lgm-inline-block" id="lgm-inline-form-wrap">
    <div class="lgm-inline-text">
      <div class="lgm-inline-eyebrow">Boletín Lagomplan</div>
      <div class="lgm-inline-headline">Más guías así, cada semana.</div>
      <div class="lgm-inline-sub">Destinos, itinerarios y tips de planeación — en tu correo.</div>
    </div>

    <div style="flex-shrink:0; width:100%; max-width:380px;">
      <div class="lgm-inline-form">
        <input
          class="lgm-inline-input"
          id="lgm-inline-email"
          type="email"
          placeholder="tu@correo.com"
          autocomplete="email"
          aria-label="Tu correo electrónico"
        />
        <button class="lgm-inline-btn" id="lgm-inline-submit">Suscribirse</button>
      </div>
      <div class="lgm-inline-error" id="lgm-inline-error">Verifica tu correo e intenta de nuevo.</div>
    </div>
  </div>

  <div class="lgm-inline-block lgm-inline-success" id="lgm-inline-success-wrap">
    <div class="lgm-inline-success-check">✓</div>
    <div>
      <div class="lgm-inline-success-msg">¡Ya estás dentro.</div>
      <div class="lgm-inline-success-sub">Revisa tu correo para confirmar tu suscripción.</div>
    </div>
  </div>
</div>

<script>
(function () {
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  var MAILCHIMP_URL = 'YOUR_MAILCHIMP_ACTION_URL';
  // Replace above with your Mailchimp action URL, e.g.:
  // 'https://lagomplan.us1.list-manage.com/subscribe/post?u=XXXXX&id=XXXXX'
  // ──────────────────────────────────────────────────────────────────────────

  var emailInput  = document.getElementById('lgm-inline-email');
  var submitBtn   = document.getElementById('lgm-inline-submit');
  var errorEl     = document.getElementById('lgm-inline-error');
  var formWrap    = document.getElementById('lgm-inline-form-wrap');
  var successWrap = document.getElementById('lgm-inline-success-wrap');

  submitBtn.addEventListener('click', function () {
    var email = emailInput.value.trim();
    errorEl.style.display = 'none';

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '...';

    var callbackName = 'lgmInlineCallback' + Date.now();
    var url = MAILCHIMP_URL.replace('/post?', '/post-json?') + '&EMAIL=' + encodeURIComponent(email) + '&c=' + callbackName;

    window[callbackName] = function (data) {
      if (data.result === 'success') {
        formWrap.style.display = 'none';
        successWrap.style.display = 'flex';
      } else {
        errorEl.textContent = data.msg && data.msg.length < 80 ? data.msg : 'Verifica tu correo e intenta de nuevo.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Suscribirse';
      }
      delete window[callbackName];
    };

    var script = document.createElement('script');
    script.src = url;
    document.body.appendChild(script);
  });

  // Allow Enter key on input
  emailInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitBtn.click();
  });
})();
</script>
